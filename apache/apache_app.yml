apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apache-app
  namespace: argocd
  
spec:
  project: devops-team
  source:
    repoURL: https://github.com/Arps9/argocd-demos.git    # Replace it with your forked repo
    targetRevision: main
    path: apache
  destination:
    server: https://172.31.23.215:33893  # Replace with your Cluster Url, To get run: `argocd cluster list`
    namespace: devops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=ture
    
    
